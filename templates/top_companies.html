<!doctype html>
<html>
  <head>
    <title>Top Companies</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <h1>{{ title }}</h1>

      <table>
        <tr>
          <th>Ticker</th>
          <th>Company</th>
          <th>MktCap</th>
        </tr>

        {% for row in data %}

        <tr>
          <td>
            <a href="/company/{{ row[0] }}"> {{ row[0] }} </a>
          </td>

          <td>{{ row[1] }}</td>

          <td>{{ row[6] }}</td>
        </tr>

        {% endfor %}
      </table>
    </div>
  </body>
</html>
